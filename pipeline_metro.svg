<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 660" font-family="'Segoe UI', Arial, sans-serif">
  <!-- ================= 16S Microbiome Pipeline — metro map ================= -->
  <rect x="0" y="0" width="1760" height="660" fill="#ffffff"/>

  <!-- title -->
  <text x="48" y="52" font-size="30" font-weight="700" fill="#2c3e50">16S rRNA Microbiome Pipeline</text>
  <text x="50" y="80" font-size="15" fill="#7f8c8d">Configuration-driven &#183; containerized &#183; QIIME&#160;2 &#43; R &#43; PICRUSt2</text>

  <!-- phase headers -->
  <g font-size="13" font-weight="700" letter-spacing="1.5" fill="#aab4bd" text-anchor="middle">
    <text x="405"  y="150">UPSTREAM &#183; QIIME&#160;2</text>
    <text x="1285" y="150">DIVERSITY &amp; STATISTICS</text>
    <text x="1590" y="150">FUNCTIONAL &amp; REPORT</text>
  </g>

  <!-- ================= lines ================= -->
  <!-- main backbone: QIIME (blue) then handoff to R reporting (green) -->
  <path d="M150,220 H1400" fill="none" stroke="#2980b9" stroke-width="7" stroke-linecap="round"/>
  <path d="M1400,220 H1650" fill="none" stroke="#16a085" stroke-width="7" stroke-linecap="round"/>

  <!-- optional cleaning branch (dashed) -->
  <path d="M650,220 C705,220 715,420 780,420 H1120 C1150,420 1155,220 1170,220"
        fill="none" stroke="#95a5a6" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="2 9"/>
  <!-- optional functional branch (dashed, orange) -->
  <path d="M1400,220 C1415,220 1420,420 1440,420 H1520 C1545,420 1525,220 1530,220"
        fill="none" stroke="#e67e22" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="2 9"/>

  <!-- branch annotations -->
  <text x="950"  y="495" font-size="12.5" font-style="italic" fill="#95a5a6" text-anchor="middle">Optional cleaning — runs only if enabled in config</text>
  <text x="1480" y="495" font-size="12.5" font-style="italic" fill="#e67e22" text-anchor="middle">PICRUSt2 (optional)</text>

  <!-- ================= input terminus ================= -->
  <rect x="40" y="200" width="110" height="40" rx="10" fill="#34495e"/>
  <text x="95" y="216" font-size="11.5" fill="#ffffff" text-anchor="middle">Raw FASTQ</text>
  <text x="95" y="231" font-size="11.5" fill="#ffffff" text-anchor="middle">+ sample sheet</text>

  <!-- ================= main stations ================= -->
  <!-- helper visual: circle r=12 fill=container, white ring; labels above -->
  <g text-anchor="middle" font-size="12.5" fill="#2c3e50">
    <!-- prep -->
    <circle cx="170" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="170" y="192">prep</text>
    <!-- import -->
    <circle cx="290" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="290" y="192">import</text>
    <!-- trim (checkpoint) -->
    <circle cx="410" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="410" y="192">trim &#9671;</text>
    <!-- denoise (checkpoint) -->
    <circle cx="530" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="530" y="192">denoise &#9671;</text>
    <!-- taxonomy -->
    <circle cx="650" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="650" y="192">taxonomy</text>
    <!-- phylogeny -->
    <circle cx="1170" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="1170" y="192">phylogeny</text>
    <!-- diversity (checkpoint) -->
    <circle cx="1290" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="1290" y="192">diversity &#9671;</text>
    <!-- stats -->
    <circle cx="1400" cy="220" r="12" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="1400" y="192">stats</text>
    <!-- report_prep (R) -->
    <circle cx="1530" cy="220" r="12" fill="#16a085" stroke="#fff" stroke-width="3"/>
    <text x="1530" y="192">report_prep</text>
  </g>

  <!-- report terminus (interchange style) -->
  <circle cx="1650" cy="220" r="16" fill="#16a085" stroke="#fff" stroke-width="3"/>
  <circle cx="1650" cy="220" r="6" fill="#ffffff"/>
  <text x="1650" y="258" font-size="13" font-weight="700" fill="#16a085" text-anchor="middle">REPORT (HTML)</text>

  <!-- ================= branch stations (optional: dashed outer ring) ================= -->
  <g text-anchor="middle" font-size="11.5" fill="#2c3e50">
    <!-- decontam (R) -->
    <circle cx="780" cy="420" r="17" fill="none" stroke="#16a085" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="780" cy="420" r="11" fill="#16a085" stroke="#fff" stroke-width="3"/>
    <text x="780" y="452">decontam</text>
    <!-- decontam_apply (QIIME) -->
    <circle cx="900" cy="420" r="17" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="900" cy="420" r="11" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="900" y="452">decontam_apply</text>
    <!-- controls (QIIME) -->
    <circle cx="1020" cy="420" r="17" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="1020" cy="420" r="11" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="1020" y="452">controls</text>
    <!-- sample QC (R, checkpoint) -->
    <circle cx="1120" cy="420" r="17" fill="none" stroke="#16a085" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="1120" cy="420" r="11" fill="#16a085" stroke="#fff" stroke-width="3"/>
    <text x="1120" y="452">sample QC &#9671;</text>
    <!-- functional / PICRUSt2 (orange) -->
    <circle cx="1440" cy="420" r="17" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="1440" cy="420" r="11" fill="#e67e22" stroke="#fff" stroke-width="3"/>
    <text x="1440" y="452">functional</text>
    <!-- functional_da (QIIME) -->
    <circle cx="1520" cy="420" r="17" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="2 3" opacity="0.8"/>
    <circle cx="1520" cy="420" r="11" fill="#2980b9" stroke="#fff" stroke-width="3"/>
    <text x="1520" y="452">functional_da</text>
  </g>

  <!-- ================= legend ================= -->
  <g transform="translate(48,540)">
    <rect x="0" y="0" width="800" height="96" rx="10" fill="#f7f9fa" stroke="#e1e6ea"/>
    <text x="18" y="26" font-size="13" font-weight="700" fill="#2c3e50">Legend</text>

    <circle cx="28" cy="50" r="9" fill="#2980b9" stroke="#fff" stroke-width="2.5"/>
    <text x="44" y="54" font-size="12.5" fill="#2c3e50">QIIME&#160;2 stage</text>

    <circle cx="190" cy="50" r="9" fill="#16a085" stroke="#fff" stroke-width="2.5"/>
    <text x="206" y="54" font-size="12.5" fill="#2c3e50">R stage (decontam &#183; QC &#183; report)</text>

    <circle cx="470" cy="50" r="9" fill="#e67e22" stroke="#fff" stroke-width="2.5"/>
    <text x="486" y="54" font-size="12.5" fill="#2c3e50">PICRUSt2 stage</text>

    <rect x="20" y="74" width="16" height="16" rx="4" fill="#34495e"/>
    <text x="44" y="86" font-size="12.5" fill="#2c3e50">input / output</text>

    <line x1="190" y1="82" x2="232" y2="82" stroke="#95a5a6" stroke-width="4" stroke-dasharray="2 6" stroke-linecap="round"/>
    <text x="242" y="86" font-size="12.5" fill="#2c3e50">optional (config toggle)</text>

    <text x="470" y="86" font-size="14" fill="#2c3e50">&#9671;</text>
    <text x="490" y="86" font-size="12.5" fill="#2c3e50">human checkpoint</text>
  </g>
</svg>
